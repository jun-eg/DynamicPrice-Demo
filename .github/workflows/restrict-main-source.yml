name: Restrict main source branch

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is develop
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ "$HEAD_REF" != "develop" ]; then
            echo "::error::PRs to main must originate from 'develop'. Got '$HEAD_REF'."
            exit 1
          fi
          echo "Source branch '$HEAD_REF' is allowed."
